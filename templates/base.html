<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cortex{% endblock %} — Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        code, pre, .mono { font-family: 'JetBrains Mono', monospace; }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .skeleton { background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .diff-add { background: #dcfce7; color: #166534; }
        .diff-del { background: #fee2e2; color: #991b1b; }
        .nav-icon { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #9ca3af; transition: all 150ms; cursor: pointer; text-decoration: none; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: #d1d5db; }
        .nav-link.active { background: rgba(16,185,129,0.1); color: #34d399; font-weight: 500; }
        .nav-group { padding: 14px 12px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #4b5563; }
        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; color: #6b7280; cursor: pointer; transition: all 150ms; }
        .tab-btn:hover { color: #d1d5db; }
        .tab-btn.active { color: #34d399; border-bottom-color: #34d399; }
    </style>
</head>
<body class="h-full bg-gray-950 text-gray-100">
    <div class="flex h-full">
        <!-- Sidebar -->
        <nav class="w-52 bg-gray-900/80 border-r border-gray-800/50 flex flex-col flex-shrink-0">
            <!-- Brand -->
            <a href="/" class="flex items-center gap-3 px-4 py-4 border-b border-gray-800/30 hover:bg-gray-800/30 transition-colors">
                <div class="w-7 h-7 rounded-md bg-emerald-500/15 flex items-center justify-center">
                    <svg class="w-4 h-4 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a8 8 0 0 1 8 8c0 3.5-2 6-4 7.5V20a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.5C6 16 4 13.5 4 10a8 8 0 0 1 8-8z"/><path d="M9 14h6"/></svg>
                </div>
                <div>
                    <div class="text-sm font-semibold text-white leading-none">Cortex</div>
                    <div class="text-[10px] text-gray-500 mt-0.5">v6 — 2.1M clips</div>
                </div>
            </a>

            <div class="flex-1 overflow-y-auto px-2 py-1">
                <!-- Overview -->
                <div class="nav-group">Overview</div>
                <a href="/" class="nav-link {% if page == 'dashboard' %}active{% endif %}">
                    <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
                </a>
                <a href="/goals" class="nav-link {% if page == 'goals' %}active{% endif %}">
                    <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                    Goals
                </a>

                <!-- Brain -->
                <div class="nav-group">Brain</div>
                <a href="/cognition" class="nav-link {% if page == 'cognition' %}active{% endif %}">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2a8 8 0 0 1 8 8c0 3.5-2 6-4 7.5V20a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.5C6 16 4 13.5 4 10a8 8 0 0 1 8-8z"/><path d="M9 14h6"/></svg>
                    Cognition
                </a>
                <a href="/imagine" class="nav-link {% if page == 'imagine' %}active{% endif %}">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    Imagine
                </a>
                <a href="/face" class="nav-link {% if page == 'face' %}active{% endif %}" target="_blank">
                    <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="10" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="10" r="1.5" fill="currentColor" stroke="none"/><path d="M8 15c1.5 2 6.5 2 8 0"/></svg>
                    Face
                    <svg class="w-3 h-3 ml-auto opacity-40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>

                <!-- Data -->
                <div class="nav-group">Data</div>
                <a href="/explore" class="nav-link {% if page == 'explore' or page == 'interact' or page == 'brain' %}active{% endif %}">
                    <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Explore
                </a>
                <a href="/training" class="nav-link {% if page == 'training' or page == 'evolution' or page == 'experiments' %}active{% endif %}">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                    Training
                </a>
            </div>

            <!-- Status footer -->
            <div class="px-3 py-2.5 border-t border-gray-800/30 text-[11px] text-gray-500">
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 pulse-dot"></span>
                    <span>System Active</span>
                </div>
            </div>
        </nav>

        <!-- Main content -->
        <main class="flex-1 overflow-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script>
    // Global toast system
    function showToast(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container');
        const colors = {
            success: 'bg-emerald-900/90 border-emerald-700 text-emerald-200',
            error: 'bg-red-900/90 border-red-700 text-red-200',
            info: 'bg-gray-800/90 border-gray-600 text-gray-200',
        };
        const toast = document.createElement('div');
        toast.className = `toast px-4 py-2.5 rounded-lg border text-sm ${colors[type] || colors.info}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, duration);
    }

    // Global fetch wrapper with error handling
    async function apiFetch(url, opts = {}, timeoutMs = 10000) {
        try {
            const r = await fetch(url, { signal: AbortSignal.timeout(timeoutMs), ...opts });
            if (!r.ok) { showToast(`API error: ${r.status}`, 'error'); return null; }
            const ct = r.headers.get('content-type') || '';
            if (ct.includes('json')) return await r.json();
            return r;
        } catch (e) {
            if (e.name === 'TimeoutError') showToast('Request timed out', 'error');
            return null;
        }
    }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
