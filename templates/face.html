{% extends "base.html" %}
{% block title %}Cortex Face{% endblock %}

{% block content %}
<div class="flex h-screen bg-gray-950 overflow-hidden">

  <!-- LEFT: Face (50%) -->
  <div class="w-1/2 flex flex-col items-center justify-center p-6 border-r border-gray-800">
    <!-- Face SVG -->
    <div class="relative w-72 h-72 mb-4">
      <svg id="face-svg" viewBox="0 0 300 300" class="w-full h-full">
        <defs>
          <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" id="glow-inner" stop-color="#10b981" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="150" cy="150" r="140" fill="url(#glow)"/>
        <ellipse cx="150" cy="155" rx="95" ry="110" fill="none" stroke="#374151" stroke-width="2"/>
        <g id="eyes">
          <ellipse id="eye-left" cx="110" cy="130" rx="18" ry="20" fill="#111827" stroke="#4b5563" stroke-width="1.5"/>
          <circle id="pupil-left" cx="110" cy="130" r="8" fill="#10b981"/>
          <circle cx="106" cy="126" r="3" fill="#fff" opacity="0.6"/>
          <ellipse id="eye-right" cx="190" cy="130" rx="18" ry="20" fill="#111827" stroke="#4b5563" stroke-width="1.5"/>
          <circle id="pupil-right" cx="190" cy="130" r="8" fill="#10b981"/>
          <circle cx="186" cy="126" r="3" fill="#fff" opacity="0.6"/>
          <ellipse id="lid-left" cx="110" cy="130" rx="19" ry="0" fill="#030712"/>
          <ellipse id="lid-right" cx="190" cy="130" rx="19" ry="0" fill="#030712"/>
        </g>
        <line id="brow-left" x1="88" y1="105" x2="132" y2="105" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
        <line id="brow-right" x1="168" y1="105" x2="212" y2="105" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M150 150 L145 170 Q150 174 155 170 Z" fill="none" stroke="#374151" stroke-width="1"/>
        <path id="mouth" d="M120 200 Q150 215 180 200" fill="none" stroke="#4b5563" stroke-width="2.5" stroke-linecap="round"/>
        <g id="speak-waves" opacity="0">
          <circle cx="150" cy="205" r="25" fill="none" stroke="#10b981" stroke-width="1" opacity="0.4"/>
          <circle cx="150" cy="205" r="35" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.2"/>
          <circle cx="150" cy="205" r="45" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.1"/>
        </g>
      </svg>
    </div>

    <!-- Thought bubble -->
    <div class="max-w-sm text-center mb-4">
      <div id="face-thought" class="text-gray-300 italic text-sm min-h-[3rem] leading-relaxed">Connecting...</div>
    </div>

    <!-- Controls -->
    <div class="flex gap-3 mb-3">
      <button id="mic-btn" onclick="toggleMic()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl text-gray-300 flex items-center gap-2 text-sm transition-all">
        <span id="mic-icon">🎤</span> <span id="mic-label">Listen</span>
      </button>
      <button id="cam-btn" onclick="toggleCam()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl text-gray-300 flex items-center gap-2 text-sm transition-all">
        <span id="cam-icon">📷</span> <span id="cam-label">Watch</span>
      </button>
      <button onclick="speakThought()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl text-gray-300 flex items-center gap-2 text-sm transition-all">
        🔊 Speak
      </button>
    </div>

    <!-- Status -->
    <div class="flex items-center gap-3 text-xs text-gray-600">
      <span id="sse-indicator" class="flex items-center gap-1"><span id="sse-dot-face" class="w-1.5 h-1.5 rounded-full bg-gray-600"></span> offline</span>
      <span>|</span>
      <span id="wm-indicator">WM: 0/7</span>
      <span>|</span>
      <span id="proto-indicator">Protos: 0</span>
    </div>
  </div>

  <!-- RIGHT: Camera + Chat + Perception (50%) -->
  <div class="w-1/2 flex flex-col p-4 overflow-hidden">

    <!-- Camera preview -->
    <div id="cam-preview" class="hidden mb-3">
      <video id="cam-video" autoplay playsinline muted class="w-full max-h-[200px] rounded-lg border border-gray-700 bg-black object-cover"></video>
      <canvas id="cam-canvas" class="hidden" width="224" height="224"></canvas>
    </div>

    <!-- What brain sees/hears (perception panel) -->
    <div class="bg-gray-900 rounded-lg border border-gray-800 p-3 mb-3">
      <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Perception</div>
      <div id="perception-display" class="text-sm text-gray-300 min-h-[2rem]">
        <span class="text-gray-600">Activate camera or microphone to perceive...</span>
      </div>
    </div>

    <!-- Chat -->
    <div class="flex-1 flex flex-col min-h-0">
      <div id="chat-log" class="flex-1 overflow-y-auto space-y-2 text-sm mb-3 pr-1">
        <div class="text-gray-600 text-xs text-center">Start a conversation with Cortex</div>
      </div>

      <div class="flex gap-2">
        <input id="chat-input" type="text" placeholder="Talk to Cortex..."
          class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-emerald-500/50"
          onkeydown="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" class="px-4 py-2 bg-emerald-800 hover:bg-emerald-700 rounded-lg text-sm text-white">Send</button>
      </div>
    </div>
  </div>

  <audio id="brain-audio" class="hidden"></audio>
</div>

<script>
const SESSION_ID = 'face_' + Date.now();
let lastAssociations = null;

// ─── Face Animation ──────────────────────────────────────────────
let currentEmotion = 'neutral';
const emotions = {
  neutral:   { mouth: 'M120 200 Q150 215 180 200', browL: -2, browR: -2, pupilSize: 8, eyeOpen: 20, color: '#10b981' },
  surprised: { mouth: 'M125 195 Q150 195 175 195', browL: -8, browR: -8, pupilSize: 10, eyeOpen: 24, color: '#f59e0b' },
  thinking:  { mouth: 'M125 205 Q150 200 175 205', browL: -4, browR: 0, pupilSize: 7, eyeOpen: 18, color: '#8b5cf6' },
  happy:     { mouth: 'M115 195 Q150 225 185 195', browL: -2, browR: -2, pupilSize: 8, eyeOpen: 18, color: '#10b981' },
  speaking:  { mouth: 'M125 198 Q150 210 175 198', browL: -2, browR: -2, pupilSize: 8, eyeOpen: 20, color: '#06b6d4' },
  dreaming:  { mouth: 'M125 205 Q150 210 175 205', browL: -1, browR: -1, pupilSize: 6, eyeOpen: 12, color: '#a78bfa' },
  learning:  { mouth: 'M120 200 Q150 218 180 200', browL: -5, browR: -5, pupilSize: 9, eyeOpen: 22, color: '#f43f5e' },
};

function setEmotion(name, duration = 3000) {
  const e = emotions[name] || emotions.neutral;
  currentEmotion = name;
  document.getElementById('mouth').setAttribute('d', e.mouth);
  document.getElementById('brow-left').setAttribute('y1', 105 + e.browL);
  document.getElementById('brow-left').setAttribute('y2', 105 + e.browL);
  document.getElementById('brow-right').setAttribute('y1', 105 + e.browR);
  document.getElementById('brow-right').setAttribute('y2', 105 + e.browR);
  ['pupil-left', 'pupil-right'].forEach(id => {
    document.getElementById(id).setAttribute('r', e.pupilSize);
    document.getElementById(id).setAttribute('fill', e.color);
  });
  ['eye-left', 'eye-right'].forEach(id => document.getElementById(id).setAttribute('ry', e.eyeOpen));
  document.getElementById('glow-inner').setAttribute('stop-color', e.color);
  document.getElementById('speak-waves').setAttribute('opacity', name === 'speaking' ? '1' : '0');
  if (duration > 0) setTimeout(() => { if (currentEmotion === name) setEmotion('neutral', 0); }, duration);
}

// Blink
setInterval(() => { if (Math.random() < 0.3) {
  ['lid-left','lid-right'].forEach(id => {
    document.getElementById(id).setAttribute('ry','20');
    setTimeout(() => document.getElementById(id).setAttribute('ry','0'), 150);
  });
}}, 3000);

// Pupil drift
let pa = 0;
setInterval(() => {
  pa += 0.02;
  const dx = Math.sin(pa)*3, dy = Math.cos(pa*0.7)*2;
  document.getElementById('pupil-left').setAttribute('cx', 110+dx);
  document.getElementById('pupil-left').setAttribute('cy', 130+dy);
  document.getElementById('pupil-right').setAttribute('cx', 190+dx);
  document.getElementById('pupil-right').setAttribute('cy', 130+dy);
}, 50);

// ─── Perception Display ─────────────────────────────────────────
function showPerception(scene, sounds, confidence) {
  const el = document.getElementById('perception-display');
  let html = '';
  if (scene.length) {
    html += `<div><span class="text-emerald-400">Scene:</span> ${scene.join(', ')}</div>`;
  }
  if (sounds.length && confidence > 0.15) {
    const certainty = confidence > 0.3 ? '' : ' <span class="text-gray-500">(uncertain)</span>';
    html += `<div><span class="text-amber-400">Sounds like:</span> ${sounds.join(', ')}${certainty}</div>`;
  }
  if (!html) html = '<span class="text-gray-600">Processing...</span>';
  el.innerHTML = html;
}

// ─── SSE ─────────────────────────────────────────────────────────
function connectFaceSSE() {
  const src = new EventSource('/api/brain/live');
  src.onopen = () => {
    document.getElementById('sse-dot-face').className = 'w-1.5 h-1.5 rounded-full bg-emerald-400';
    document.getElementById('sse-indicator').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> live';
  };
  src.onmessage = (e) => { try { handleFaceEvent(JSON.parse(e.data)); } catch {} };
  src.onerror = () => {
    document.getElementById('sse-indicator').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> reconnecting';
    src.close(); setTimeout(connectFaceSSE, 3000);
  };
}

function handleFaceEvent(ev) {
  switch (ev.type) {
    case 'init':
      document.getElementById('wm-indicator').textContent = `WM: ${ev.working_memory?.slots_used||0}/7`;
      document.getElementById('proto-indicator').textContent = `Protos: ${ev.prototypes||0}`;
      break;
    case 'perception':
      setEmotion('surprised', 2000);
      document.getElementById('face-thought').textContent = `I perceive: ${ev.label}`;
      break;
    case 'working_memory':
      document.getElementById('wm-indicator').textContent = `WM: ${ev.slots}/7`;
      break;
    case 'prototype':
      setEmotion('learning', 2000);
      document.getElementById('face-thought').textContent = ev.action === 'created'
        ? `New concept: ${ev.prototype||ev.label}!`
        : `Refining: ${ev.prototype||ev.label}`;
      break;
    case 'dream':
      setEmotion('dreaming', 4000);
      document.getElementById('face-thought').textContent = `Dreaming: ${(ev.sequence||[]).join(' → ')}`;
      if (ev.surprise > 0.3) brainSays(`I just dreamed: ${(ev.sequence||[]).join(' then ')}. Surprising!`);
      break;
    case 'youtube_learned':
      setEmotion('happy', 3000);
      brainSays(`I learned about ${ev.category}. ${ev.total} sounds studied so far.`);
      break;
    case 'speak': setEmotion('speaking', 3000); break;
    case 'autonomy_cycle':
      document.getElementById('face-thought').textContent = `Curious about: ${(ev.curious||[]).slice(0,3).join(', ')}`;
      break;
  }
}

// ─── Brain-Initiated Conversation ────────────────────────────────
let lastBrainSpeech = 0;
const COOLDOWN = 15000;

function brainSays(text) {
  const now = Date.now();
  if (now - lastBrainSpeech < COOLDOWN) return;
  lastBrainSpeech = now;
  addChatLine('cortex', text);
  document.getElementById('face-thought').textContent = text;
}

async function brainRespondsTo(text) {
  const now = Date.now();
  if (now - lastBrainSpeech < COOLDOWN) return;
  lastBrainSpeech = now;
  setEmotion('thinking', 3000);
  try {
    const resp = await fetch('/api/brain/dialogue/grounded', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: text, session_id: SESSION_ID }),
    });
    const data = await resp.json();
    if (data.response) {
      setEmotion('speaking', 3000);
      addChatLine('cortex', data.response);
      document.getElementById('face-thought').textContent = data.response;
      autoSpeak(data.response);
    }
  } catch {}
}

async function autoSpeak(text) {
  try {
    const resp = await fetch('/api/brain/speak', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text: text.substring(0, 300) }),
    });
    if (resp.ok && resp.headers.get('content-type')?.includes('audio')) {
      const blob = await resp.blob();
      const audio = document.getElementById('brain-audio');
      audio.src = URL.createObjectURL(blob);
      setEmotion('speaking');
      audio.play();
      audio.onended = () => setEmotion('neutral');
    }
  } catch {}
}

async function speakThought() {
  setEmotion('speaking', 5000);
  try {
    const resp = await fetch('/api/brain/speak/thought');
    if (resp.ok && resp.headers.get('content-type')?.includes('audio')) {
      const blob = await resp.blob();
      const audio = document.getElementById('brain-audio');
      audio.src = URL.createObjectURL(blob);
      audio.play();
      audio.onended = () => setEmotion('neutral');
    }
  } catch { setEmotion('neutral'); }
}

// ─── Microphone ──────────────────────────────────────────────────
let micStream=null, micCtx=null, micProc=null, micBuf=[], micActive=false, micInt=null;

function toggleMic() { micActive ? stopMic() : startMic(); }

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true}});
    micCtx = new AudioContext({sampleRate:16000});
    const src = micCtx.createMediaStreamSource(micStream);
    micProc = micCtx.createScriptProcessor(4096,1,1);
    micBuf = [];
    micProc.onaudioprocess = e => micBuf.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    src.connect(micProc); micProc.connect(micCtx.destination);
    micActive = true;
    document.getElementById('mic-btn').className = 'px-4 py-2 bg-red-800 hover:bg-red-700 border border-red-600 rounded-xl text-white flex items-center gap-2 text-sm transition-all';
    document.getElementById('mic-label').textContent = 'Stop';
    micInt = setInterval(sendMicAudio, 5000);
  } catch(e) { console.error('Mic:',e); }
}

function stopMic() {
  if(micInt) clearInterval(micInt);
  if(micProc) micProc.disconnect();
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  micActive=false; micBuf=[];
  document.getElementById('mic-btn').className = 'px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl text-gray-300 flex items-center gap-2 text-sm transition-all';
  document.getElementById('mic-label').textContent = 'Listen';
}

async function sendMicAudio() {
  if(!micBuf.length) return;
  const total = micBuf.reduce((s,b)=>s+b.length,0);
  const combined = new Float32Array(total);
  let off=0; for(const b of micBuf){combined.set(b,off);off+=b.length;} micBuf=[];
  const b64 = btoa(String.fromCharCode(...new Uint8Array(combined.buffer)));
  try {
    const resp = await fetch('/api/listen/process', {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({audio_b64:b64,sample_rate:16000,top_k:10})});
    const data = await resp.json();
    if(data.summary) {
      const transcription = data.summary.transcription;
      const iHear = data.summary.i_hear||[];
      const clap = data.summary.clap_labels||[];
      const reminds = data.summary.which_reminds_me_of||[];

      if(transcription && transcription.length > 5) {
        setEmotion('surprised', 2000);
        showPerception([`Speech: "${transcription}"`], reminds.slice(0,2), 0.5);
        addChatLine('you', `"${transcription}"`);
        brainRespondsTo(transcription);
      } else if(iHear.length || clap.length) {
        const labels = (clap.length ? clap : iHear).slice(0,3);
        setEmotion('thinking', 2000);
        showPerception(labels, reminds.slice(0,2), 0.3);
      }
      if(data.summary.narration) document.getElementById('face-thought').textContent = data.summary.narration;
    }
  } catch(e) { console.error('Listen:',e); }
}

// ─── Camera ──────────────────────────────────────────────────────
let camStream=null, camActive=false, camInt=null;
function toggleCam() { camActive ? stopCam() : startCam(); }

async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{width:320,height:240}});
    document.getElementById('cam-video').srcObject = camStream;
    document.getElementById('cam-preview').classList.remove('hidden');
    camActive=true;
    document.getElementById('cam-btn').className = 'px-4 py-2 bg-red-800 hover:bg-red-700 border border-red-600 rounded-xl text-white flex items-center gap-2 text-sm transition-all';
    document.getElementById('cam-label').textContent = 'Stop';
    camInt = setInterval(sendCamFrame, 5000);
  } catch(e) { console.error('Cam:',e); }
}

function stopCam() {
  if(camInt) clearInterval(camInt);
  if(camStream) camStream.getTracks().forEach(t=>t.stop());
  camActive=false;
  document.getElementById('cam-preview').classList.add('hidden');
  document.getElementById('cam-btn').className = 'px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl text-gray-300 flex items-center gap-2 text-sm transition-all';
  document.getElementById('cam-label').textContent = 'Watch';
}

async function sendCamFrame() {
  const video = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  const ctx = canvas.getContext('2d');
  const s = Math.min(video.videoWidth, video.videoHeight);
  ctx.drawImage(video, (video.videoWidth-s)/2, (video.videoHeight-s)/2, s, s, 0, 0, 224, 224);
  const b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  try {
    const resp = await fetch('/api/brain/watch', {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image_b64:b64,top_k:10})});
    const data = await resp.json();
    if(data.summary) {
      const confidence = data.summary.confidence||0;
      const clipScene = data.summary.clip_scene||[];
      const soundsLike = data.summary.which_sounds_like||[];

      showPerception(clipScene.slice(0,3), soundsLike.slice(0,3), confidence);

      if(confidence > 0.3) {
        setEmotion('surprised', 2000);
      } else if(confidence > 0.15) {
        setEmotion('thinking', 2000);
      }

      if(data.summary.narration) document.getElementById('face-thought').textContent = data.summary.narration;
      lastAssociations = data.associations;
    }
  } catch(e) { console.error('Watch:',e); }
}

// ─── Chat ────────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim(); if(!msg) return; input.value='';
  addChatLine('you', msg);
  setEmotion('thinking', 5000);

  // Only use /ask for specific sound/concept queries, everything else goes to dialogue
  const isSoundQuery = /\b(sound|hear|listen|audio|noise|what does .+ sound|play)\b/i.test(msg);

  try {
    let data;
    if(isSoundQuery) {
      const r = await fetch('/api/brain/ask',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question:msg,session_id:SESSION_ID})});
      data = await r.json();
    } else {
      const r = await fetch('/api/brain/dialogue/grounded',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:msg,session_id:SESSION_ID})});
      data = await r.json();
    }
    const reply = data.response||data.answer||'I have no response.';
    setEmotion('speaking', 3000);
    addChatLine('cortex', reply);
    document.getElementById('face-thought').textContent = reply;
  } catch { addChatLine('cortex','Error.'); setEmotion('neutral'); }
}

function addChatLine(role, text) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  const isUser = role === 'you';
  div.className = `p-2 rounded-lg ${isUser ? 'bg-gray-800 ml-8' : 'bg-emerald-900/30 mr-8'}`;
  div.innerHTML = `<span class="text-xs ${isUser?'text-gray-500':'text-emerald-500'} font-semibold">${isUser?'You':'Cortex'}</span><br><span class="${isUser?'text-gray-300':'text-emerald-200'} text-sm">${text}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  while(log.children.length > 40) log.removeChild(log.firstChild);
}

// ─── Init ────────────────────────────────────────────────────────
connectFaceSSE();
setEmotion('neutral', 0);
fetch('/api/brain/thoughts').then(r=>r.json()).then(d=>{
  if(d.thought) document.getElementById('face-thought').textContent = d.thought;
  document.getElementById('wm-indicator').textContent = `WM: ${d.working_memory?.slots_used||0}/7`;
  document.getElementById('proto-indicator').textContent = `Protos: ${d.prototypes_active||0}`;
}).catch(()=>{});
</script>

<style>
#speak-waves circle { animation: wpulse 2s infinite; }
#speak-waves circle:nth-child(2) { animation-delay: 0.3s; }
#speak-waves circle:nth-child(3) { animation-delay: 0.6s; }
@keyframes wpulse { 0%,100%{opacity:0;transform:scale(.8)} 50%{opacity:.4;transform:scale(1.1)} }
</style>
{% endblock %}
