{% extends "base.html" %}
{% block title %}Imagine{% endblock %}

{% block content %}
<div class="p-6 max-w-5xl mx-auto">
  <div class="mb-5">
    <h2 class="text-xl font-bold">Imagination Engine</h2>
    <p class="text-xs text-gray-500 mt-0.5">Perception, prediction, causation, association, composition</p>
  </div>

  <!-- Imagine box -->
  <div class="bg-gradient-to-r from-gray-800 to-gray-900 rounded-lg p-5 border border-gray-700 mb-5">
    <div class="flex gap-3">
      <input id="imagine-input" type="text" placeholder="What would happen if... thunder, swimming dog, campfire at night..."
        class="flex-1 bg-gray-700/50 text-white rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-amber-500 border border-gray-600 text-sm"
        onkeydown="if(event.key==='Enter') imagine()">
      <button onclick="imagine()" class="px-5 py-2.5 bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white rounded-lg font-semibold transition-all">Imagine</button>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="hidden mb-5">
    <div id="narrative" class="bg-gray-900 rounded-lg p-5 border border-gray-800 mb-4"></div>
    <div id="steps" class="grid grid-cols-5 gap-2 mb-3"></div>
    <div id="meta" class="text-xs text-gray-500"></div>
  </div>

  <!-- Tools -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
    <!-- Concept arithmetic -->
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
      <h3 class="text-xs text-teal-400 font-semibold uppercase tracking-wider mb-2">Concept Arithmetic</h3>
      <input id="add-concepts" type="text" placeholder="dog, rain" class="w-full bg-gray-800 text-white rounded px-3 py-1.5 text-xs focus:ring-1 focus:ring-teal-500 focus:outline-none mb-2 border border-gray-700">
      <div class="flex gap-2">
        <input id="sub-concepts" type="text" placeholder="subtract (optional)" class="flex-1 bg-gray-800 text-white rounded px-3 py-1.5 text-xs focus:ring-1 focus:ring-teal-500 focus:outline-none border border-gray-700">
        <button onclick="compose()" class="px-3 py-1.5 bg-teal-700 hover:bg-teal-600 rounded text-xs text-white">=</button>
      </div>
      <div id="compose-result" class="text-xs text-gray-300 min-h-[1.5rem] mt-2"></div>
    </div>
    <!-- Curiosity -->
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
      <h3 class="text-xs text-orange-400 font-semibold uppercase tracking-wider mb-2">Curiosity Report</h3>
      <button onclick="loadCuriosity()" class="w-full px-3 py-1.5 bg-orange-900/40 hover:bg-orange-800/40 border border-orange-700/40 rounded text-xs text-gray-300 mb-2">Load</button>
      <div id="curiosity-report" class="text-xs text-gray-400 space-y-1 max-h-[120px] overflow-y-auto"></div>
    </div>
    <!-- Self-assessment -->
    <div class="bg-gray-900 rounded-lg p-4 border border-gray-800">
      <h3 class="text-xs text-blue-400 font-semibold uppercase tracking-wider mb-2">Self-Assessment</h3>
      <button onclick="loadSelfAssessment()" class="w-full px-3 py-1.5 bg-blue-900/40 hover:bg-blue-800/40 border border-blue-700/40 rounded text-xs text-gray-300 mb-2">Load</button>
      <div id="self-report" class="text-xs text-gray-400 space-y-1 max-h-[120px] overflow-y-auto"></div>
    </div>
  </div>

  <!-- Causal explorer -->
  <div class="bg-gray-900 rounded-lg p-4 border border-gray-800 mb-5">
    <h3 class="text-xs text-red-400 font-semibold uppercase tracking-wider mb-2">Causal Explorer</h3>
    <div class="flex gap-2 mb-2">
      <input id="causal-input" type="text" placeholder="Category (e.g. thunder, dog barking)"
        class="flex-1 bg-gray-800 text-white rounded px-3 py-1.5 text-xs focus:ring-1 focus:ring-red-500 focus:outline-none border border-gray-700"
        onkeydown="if(event.key==='Enter') exploreCausal()">
      <button onclick="exploreCausal()" class="px-3 py-1.5 bg-red-800 hover:bg-red-700 rounded text-xs text-white">Explore</button>
    </div>
    <div id="causal-result" class="grid grid-cols-2 gap-4 text-sm"></div>
  </div>

  <!-- History -->
  <div id="history" class="space-y-2"></div>
</div>

<script>
async function imagine() {
  const query = document.getElementById('imagine-input').value.trim();
  if (!query) return;
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('narrative').innerHTML = '<div class="text-amber-400 animate-pulse text-sm">Imagining...</div>';
  document.getElementById('steps').innerHTML = '';
  const data = await apiFetch('/api/brain/imagine', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,depth:3})});
  if (!data) { document.getElementById('narrative').innerHTML = '<div class="text-red-400 text-sm">Failed</div>'; return; }
  document.getElementById('narrative').innerHTML = `<div class="text-gray-200 leading-relaxed text-sm">${data.narrative || 'No imagination generated.'}</div>`;
  const stepColors = {perceive:'indigo',predict:'amber',cause:'red',associate:'purple',compose:'teal',expanded_concepts:'blue'};
  document.getElementById('steps').innerHTML = (data.steps||[]).map(s => {
    const labels = s.labels || s.chain || [];
    const c = stepColors[s.step] || 'gray';
    return `<div class="bg-gray-900 rounded p-2 border border-${c}-800/30"><div class="text-[10px] text-${c}-400 font-semibold uppercase mb-1">${s.step}</div><div class="text-[10px] text-gray-300">${labels.length ? labels.join(s.step==='cause'?' -> ':',') : '-'}</div></div>`;
  }).join('');
  document.getElementById('meta').textContent = `${data.process_time}s${data.confidence != null ? ' | Confidence: '+(data.confidence*100).toFixed(1)+'%' : ''}`;
  addHistory(query, data);
}

function addHistory(query, data) {
  const el = document.getElementById('history');
  const card = document.createElement('div');
  card.className = 'bg-gray-900 rounded p-3 border border-gray-800 text-xs fade-in';
  card.innerHTML = `<div class="text-gray-500 mb-1">${new Date().toLocaleTimeString()} — "${query}"</div><div class="text-gray-300">${data.narrative || ''}</div>`;
  el.insertBefore(card, el.firstChild);
  while (el.children.length > 10) el.removeChild(el.lastChild);
}

async function compose() {
  const add = document.getElementById('add-concepts').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  const sub = document.getElementById('sub-concepts').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  if (!add.length) return;
  const div = document.getElementById('compose-result');
  div.textContent = 'Computing...';
  const data = await apiFetch('/api/brain/compose', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({add,subtract:sub,top_k:5})});
  if (!data) { div.textContent = 'Failed'; return; }
  div.innerHTML = `<span class="text-teal-400">${data.interpretation||''}</span><br>` + (data.results||[]).map(r => `<span class="text-gray-400">${r.concept} (${(r.similarity*100).toFixed(0)}%)</span>`).join(', ');
}

async function loadCuriosity() {
  const div = document.getElementById('curiosity-report'); div.innerHTML = 'Loading...';
  const data = await apiFetch('/api/brain/curiosity');
  if (!data) { div.textContent = 'Failed'; return; }
  div.innerHTML = `<div class="font-semibold text-orange-400">${data.total_categories} categories</div>` +
    (data.categories||[]).slice(0,10).map(c => `<div class="flex justify-between"><span>${c.category}</span><span class="text-orange-300">${(c.curiosity*100).toFixed(1)}%</span></div>`).join('');
}

async function loadSelfAssessment() {
  const div = document.getElementById('self-report'); div.innerHTML = 'Loading...';
  const data = await apiFetch('/api/brain/self/assessment');
  if (!data) { div.textContent = 'Failed'; return; }
  div.innerHTML = `<div class="text-gray-300 mb-1">${data.narrative||''}</div>` +
    '<div class="font-semibold text-blue-400">Best:</div>' + (data.best_categories||[]).slice(0,5).map(c => `<div class="flex justify-between"><span>${c.category}</span><span class="text-emerald-300">${c.mrr}</span></div>`).join('') +
    '<div class="font-semibold text-red-400 mt-1">Weakest:</div>' + (data.worst_categories||[]).slice(0,5).map(c => `<div class="flex justify-between"><span>${c.category}</span><span class="text-red-300">${c.mrr}</span></div>`).join('');
}

async function exploreCausal() {
  const cat = document.getElementById('causal-input').value.trim();
  if (!cat) return;
  const div = document.getElementById('causal-result');
  div.innerHTML = '<div class="col-span-2 text-gray-400 text-xs">Loading...</div>';
  const [pred, expl] = await Promise.all([
    apiFetch(`/api/brain/causal/predict?category=${encodeURIComponent(cat)}&top_k=8`),
    apiFetch(`/api/brain/causal/explain?category=${encodeURIComponent(cat)}`),
  ]);
  let html = `<div><div class="font-semibold text-red-400 text-xs mb-1">What follows "${cat}"?</div>${(pred?.predictions||[]).slice(0,6).map(p => `<div class="flex justify-between text-xs"><span class="text-gray-300">${p.category}</span><span class="text-red-300">${p.score?(p.score*100).toFixed(1)+'%':p.probability}</span></div>`).join('')||'<div class="text-gray-600 text-xs">None</div>'}</div>`;
  html += `<div><div class="font-semibold text-cyan-400 text-xs mb-1">Causes</div>${(expl?.causes||[]).slice(0,4).map(c => `<div class="text-xs text-gray-400">${c.category} (${c.count}x)</div>`).join('')||'<div class="text-xs text-gray-600">None</div>'}<div class="font-semibold text-purple-400 text-xs mt-2 mb-1">Effects</div>${(expl?.effects||[]).slice(0,4).map(e => `<div class="text-xs text-gray-400">${e.category} (${e.count}x)</div>`).join('')||'<div class="text-xs text-gray-600">None</div>'}</div>`;
  div.innerHTML = html;
}
</script>
{% endblock %}
