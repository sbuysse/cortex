# =============================================================================
# GitHub Actions CI — Associative Multimodal Network
#
# Triggers on pushes to main and on pull requests.
# Jobs: lint, test, build.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff + mypy
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run ruff linter
        run: python -m ruff check src/ scripts/ tests/

      - name: Run ruff format check
        run: python -m ruff format --check src/ scripts/ tests/

      - name: Run mypy
        run: python -m mypy src/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Test — pytest (CPU-only, no slow tests)
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -m "not slow and not gpu" \
            -v \
            --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ---------------------------------------------------------------------------
  # Build — Docker image build (no push)
  # ---------------------------------------------------------------------------
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build training image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.train
          push: false
          tags: brain-train:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.inference
          push: false
          tags: brain-inference:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
